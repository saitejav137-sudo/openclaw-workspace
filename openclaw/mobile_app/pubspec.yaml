name: openclaw_app
description: OpenClaw Mobile App - Vision-based automation control
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # HTTP & API
  dio: ^5.3.3
  web_socket_channel: ^2.4.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  fl_chart: ^0.65.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
