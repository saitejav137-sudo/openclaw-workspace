apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.ports.websocket }}
      targetPort: websocket
      protocol: TCP
      name: websocket
    - port: {{ .Values.service.ports.stream }}
      targetPort: stream
      protocol: TCP
      name: stream
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
---
{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}-lb
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.ports.websocket }}
      targetPort: websocket
      protocol: TCP
      name: websocket
    - port: {{ .Values.service.ports.stream }}
      targetPort: stream
      protocol: TCP
      name: stream
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
{{- end }}
