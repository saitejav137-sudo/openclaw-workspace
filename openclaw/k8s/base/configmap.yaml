apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: config
data:
  OPENCLAW_MODE: "ocr"
  OPENCLAW_POLL: "true"
  OPENCLAW_POLL_INTERVAL: "0.5"
  OPENCLAW_API_KEY: ""
  OPENCLAW_DB_ENABLED: "true"
  OPENCLAW_LOG_ENABLED: "true"
  OPENCLAW_LOG_FILE: "/data/logs/openclaw.log"
  OPENCLAW_WEBSOCKET_ENABLED: "true"
  OPENCLAW_STREAM_ENABLED: "true"
